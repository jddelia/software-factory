name: Bug report
description: Report a reproducible issue with the skill or bundled generator.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, private repository data, tokens, or sensitive logs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps, command, or prompt that reproduces the issue.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include short, sanitized output when useful.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release, branch, or commit SHA.
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "python3 --version"
  - type: textarea
    id: checks
    attributes:
      label: Checks run
      description: Paste the commands you ran and whether they passed.
      placeholder: |
        python3 -m unittest discover -s tests
        python3 -m py_compile scripts/seed_factory_docs.py
